set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
unbind r
bind r source-file ~/.tmux.conf \; display-message "config reloaded ✓"
#windowspane 
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# label each pane's border with its index and running command
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_current_command} "

#status information
set -g status 2
# set mouse on
set -g mouse on
# send copied text to the local terminal's clipboard via OSC52 (works over SSH)
set -g set-clipboard on
# keep status-bar messages on screen long enough to read (2s)
set -g display-time 2000
# subtle highlight on windows with new output (no distracting popups)
set -g monitor-activity on
set -g visual-activity off
# larger scrollback buffer
set -g history-limit 50000
# let vim/nvim detect focus changes (autoread, gitgutter, etc.)
set -g focus-events on
# Set the prefix to Ctrl+a
set -g prefix C-s
# Remove the old prefix
unbind C-b

# Send Ctrl+a to applications by pressing it twice
# Trying something out
#bind C-s send-prefix

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# resize panes (repeatable: hold prefix, tap H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# fzf session switcher popup
bind f display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs -r tmux switch-client -t"

# floating scratch terminal (prefix g toggles a popup shell in the current dir)
bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E

# project sessionizer: fuzzy-pick a workspace and create/attach its session
bind o display-popup -E "tmux-sessionizer"

# move between windows
bind -n M-H previous-window
bind -n M-L next-window
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @catppuccin_flavour 'mocha'
# show this machine's hostname on the right of the status bar (handy over SSH)
set -g @catppuccin_host 'on'

# set vi-mode
set-window-option -g mode-keys vi
#keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# tmux continonoum (some spelling mistake, thats ok)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
# restore scrollback contents and nvim sessions on resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Open panes in current directory

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# intuitive split keys (keep current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
